    <div class="armor-figure">
      <h4>Points d'Armure</h4>
      <div class="armor-points-grid">
        <!-- Tête -->
        <div class="armor-zone full">
          <label for="armor-head">Tête (01-15)</label>
          <input type="number" id="armor-head" 
                name="system.armorTotals.head" 
                value="{{system.armorTotals.head}}" 
                min="{{system.secondaire.actuel.be}}" 
                readonly>
        </div>

        <!-- Bras gauche / droit -->
        <div class="armor-zone half">
          <label for="armor-arm-left">Bras Gauche (36-55)</label>
          <input type="number" id="armor-arm-left" 
                name="system.armorTotals.armLeft" 
                value="{{system.armorTotals.armLeft}}" 
                min="{{system.secondaire.actuel.be}}" 
                readonly>
        </div>
        <div class="armor-zone half">
          <label for="armor-arm-right">Bras Droit (16-30)</label>
          <input type="number" id="armor-arm-right" 
                name="system.armorTotals.armRight" 
                value="{{system.armorTotals.armRight}}" 
                min="{{system.secondaire.actuel.be}}" 
                readonly>
        </div>

        <!-- Corps -->
        <div class="armor-zone full">
          <label for="armor-body">Corps (56-80)</label>
          <input type="number" id="armor-body" 
                name="system.armorTotals.body" 
                value="{{system.armorTotals.body}}" 
                min="{{system.secondaire.actuel.be}}" 
                readonly>
        </div>

        <!-- Jambes gauche / droite -->
        <div class="armor-zone half">
          <label for="armor-leg-left">Jambe Gauche (91-00)</label>
          <input type="number" id="armor-leg-left" 
                name="system.armorTotals.legLeft" 
                value="{{system.armorTotals.legLeft}}" 
                min="{{system.secondaire.actuel.be}}" 
                readonly>
        </div>
        <div class="armor-zone half">
          <label for="armor-leg-right">Jambe Droite (81-90)</label>
          <input type="number" id="armor-leg-right" 
                name="system.armorTotals.legRight" 
                value="{{system.armorTotals.legRight}}" 
                min="{{system.secondaire.actuel.be}}" 
                readonly>
        </div>
      </div>

    <!-- Malus -->
    <div class="armor-maluses">
      <label>

      </label>
      <label>
        <input type="checkbox">
        Porter une armure lourde réduit de 1 le Mouvement à moins d'avoir le Talent Robuste.
